stages:
  - build
  - docker
  - deploy
  - notify

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

cache:
  paths:
    - .m2/repository

# ─── STAGE 1: Build ─────────────────────────────────────────────────
build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - echo "Building..."
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour
  only:
    - main

# ─── STAGE 2: Docker Build & Push ───────────────────────────────────
docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$IMAGE_TAG -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

# ─── STAGE 3: Deploy ────────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        export CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE &&
        export IMAGE_TAG=$IMAGE_TAG &&
        export DB_USERNAME=$DB_USERNAME &&
        export DB_PASSWORD=$DB_PASSWORD &&
        cd /opt/online-learning &&
        docker compose pull &&
        docker compose up -d --remove-orphans &&
        docker image prune -f
      "
  only:
    - main

# ─── STAGE 4: Notify ────────────────────────────────────────────────
notify-success:
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d chat_id="$TELEGRAM_CHAT_ID" \
        -d parse_mode="Markdown" \
        -d text="✅ *Deployment Successful!*%0A📦 *Project:* $CI_PROJECT_NAME%0A🌿 *Branch:* $CI_COMMIT_REF_NAME%0A🔖 *Commit:* $CI_COMMIT_SHORT_SHA"
  when: on_success
  only:
    - main

notify-failure:
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d chat_id="$TELEGRAM_CHAT_ID" \
        -d parse_mode="Markdown" \
        -d text="❌ *Deployment FAILED!*%0A📦 *Project:* $CI_PROJECT_NAME%0A🌿 *Branch:* $CI_COMMIT_REF_NAME%0A🔖 *Commit:* $CI_COMMIT_SHORT_SHA"
  when: on_failure
  only:
    - main