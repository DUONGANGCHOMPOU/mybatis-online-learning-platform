stages:
  - build
  - docker
  - deploy
  - notify

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# ─── Cache Maven dependencies ───────────────────────────────────────
cache:
  paths:
    - .m2/repository

# ─── STAGE 1: Build & Test ──────────────────────────────────────────
build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - echo "Building and testing..."
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour
  only:
    - main

# ─── STAGE 2: Build Docker Image & Push to Registry ─────────────────
docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Logging into GitLab Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "Building Docker image..."
    - docker build -t $CI_REGISTRY_IMAGE:$IMAGE_TAG -t $CI_REGISTRY_IMAGE:latest .
    - echo "Pushing Docker image..."
    - docker push $CI_REGISTRY_IMAGE:$IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main

# ─── STAGE 3: Deploy via SSH ─────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - echo "Deploying to server..."
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
        export CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE &&
        export IMAGE_TAG=$IMAGE_TAG &&
        export DB_USERNAME=$DB_USERNAME &&
        export DB_PASSWORD=$DB_PASSWORD &&
        cd /opt/online-learning &&
        docker compose pull &&
        docker compose up -d --remove-orphans &&
        docker image prune -f
      "
  only:
    - main

# ─── STAGE 4: Telegram Notification ─────────────────────────────────
notify-success:
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      MESSAGE="✅ *Deployment Successful!*
      
      📦 *Project:* $CI_PROJECT_NAME
      🌿 *Branch:* $CI_COMMIT_REF_NAME
      👤 *Author:* $CI_COMMIT_AUTHOR
      💬 *Message:* $CI_COMMIT_MESSAGE
      🔖 *Commit:* \`$CI_COMMIT_SHORT_SHA\`
      🔗 [View Pipeline]($CI_PIPELINE_URL)"

      curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d chat_id="$TELEGRAM_CHAT_ID" \
        -d parse_mode="Markdown" \
        -d text="$MESSAGE"
  when: on_success
  only:
    - main

notify-failure:
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      MESSAGE="❌ *Deployment FAILED!*
      
      📦 *Project:* $CI_PROJECT_NAME
      🌿 *Branch:* $CI_COMMIT_REF_NAME
      👤 *Author:* $CI_COMMIT_AUTHOR
      💬 *Message:* $CI_COMMIT_MESSAGE
      🔖 *Commit:* \`$CI_COMMIT_SHORT_SHA\`
      🔗 [View Pipeline]($CI_PIPELINE_URL)"

      curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
        -d chat_id="$TELEGRAM_CHAT_ID" \
        -d parse_mode="Markdown" \
        -d text="$MESSAGE"
  when: on_failure
  only:
    - main